<!DOCTYPE html><html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLM Driver Uploader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #000;
        color: #E0E0E0;
        overflow-x: hidden;
      }
      
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(to right, rgba(0, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 2.5rem 2.5rem;
        animation: grid-scroll 30s linear infinite;
        z-index: -1;
        opacity: 0.8;
      }

      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      
      .glowing-text {
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.7), 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
      }
      
      @keyframes grid-scroll {
        from { background-position: 0 0; }
        to { background-position: -80px -80px; }
      }
      
      /* --- Custom Form Field Styles --- */
      .form-field-container {
        position: relative;
        padding-top: 0.75rem; /* Space for the label */
      }
      .form-field-label {
        position: absolute;
        top: -0.25rem;
        left: 0.75rem;
        background-color: #000;
        padding: 0 0.25rem;
        font-size: 0.75rem;
        font-weight: 500;
        color: #9ca3af;
        z-index: 10;
        transition: color 0.2s ease-in-out;
      }
      .form-field-input {
        background-color: transparent !important;
        border: 1px solid #4b5563 !important;
        border-radius: 0 !important;
        color: #E0E0E0 !important;
        padding: 0.65rem 0.75rem !important;
        transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }
      .form-field-input:focus {
        outline: none !important;
        border-color: #FFF !important;
        box-shadow: none !important;
      }
      /* This is the key logic that makes the label 'float' and change color */
      .form-field-input:focus + .form-field-label,
      .form-field-input:not(:placeholder-shown) + .form-field-label { 
        color: #FFF;
      }
      /* Fix for autofill background color */
      .form-field-input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
        -webkit-text-fill-color: #E0E0E0 !important;
      }

      /* --- Custom Radio Buttons --- */
      .radio-group input[type="radio"] {
        opacity: 0;
        position: fixed;
        width: 0;
      }
      .radio-group label {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        color: #9ca3af;
        transition: color 0.2s ease-in-out;
      }
      .radio-group input[type="radio"]:checked + label {
        color: #00ffff;
      }
      .radio-group label::before {
        content: '';
        width: 1em;
        height: 1em;
        border-radius: 50%;
        border: 2px solid #6b7280;
        margin-right: 0.5em;
        background-color: transparent;
        transition: all 0.2s ease-in-out;
      }
      .radio-group input[type="radio"]:checked + label::before {
        border-color: #00ffff;
        background-color: #00ffff;
        box-shadow: 0 0 5px #00ffff;
      }
      .radio-group input[type="radio"]:focus-visible + label {
         outline: 2px solid #38bdf8;
         outline-offset: 2px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "idb": "https://aistudiocdn.com/idb@^8.0.0"
  }
}</script></head>

    <div id="root"></div>

  </body></html>
