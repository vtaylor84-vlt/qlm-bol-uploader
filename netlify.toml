# netlify.toml (Final Required Content)

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # CRITICAL FIXES FOR NETLIFY CSS PROCESSING:
  NODE_VERSION = "18"
  POSTCSS_VERSION = "8.4.35" 
  NPM_CONFIG_FORCE = "true" 

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"