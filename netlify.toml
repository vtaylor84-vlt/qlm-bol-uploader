# netlify.toml (FINAL, GUARANTEED BUILD COMMAND)

[build]
  publish = "dist"
  # Revert to the standard, simple command now that all files are clean
  command = "npm run build"

[build.environment]
  # CRITICAL FIX 1: Set a stable Node version (Node 18 is robust)
  NODE_VERSION = "18"
  
  # CRITICAL FIX 2: Explicitly ensure the POSTCSS version is defined.
  POSTCSS_VERSION = "8.4.35" 
  
  # Optional: Adds build flags for a clean install
  NPM_CONFIG_FORCE = "true" 

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"