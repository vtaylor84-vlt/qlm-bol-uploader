# netlify.toml (FINAL, MINIMAL DEPLOYMENT CONFIG)

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # Remove NODE_VERSION here, as it's now set in .nvmrc
  # Keep the POSTCSS version lock as a safeguard
  POSTCSS_VERSION = "8.4.35" 
  NPM_CONFIG_FORCE = "true" 
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"