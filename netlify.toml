# netlify.toml (Final Nudge)

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # CRITICAL FIX 1: Set a stable Node version (Node 18 is robust and stable)
  NODE_VERSION = "18"
  
  # CRITICAL FIX 2: Explicitly lock the PostCSS version to avoid conflicts with Tailwind
  POSTCSS_VERSION = "8.4.35" 

  # TEMPORARY NUDGE: Adding a dummy variable to force a fresh build context
  DUMMY_VERSION = "v1" 
  
  # Optional: Forces a clean install for better consistency
  NPM_CONFIG_FORCE = "true" 

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"