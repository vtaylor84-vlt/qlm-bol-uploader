# netlify.toml (FINAL, SIMPLE, CLEAN BUILD COMMAND)

[build]
  publish = "dist"
  # Revert to the standard, simple command now that the environment is set
  command = "npm run build"

[build.environment]
  # (Keep these environment variables)
  NODE_VERSION = "18"
  POSTCSS_VERSION = "8.4.35" 
  NPM_CONFIG_FORCE = "true" 

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"